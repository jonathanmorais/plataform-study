name: Java — CI/CD Template (Reusable)

on:
  workflow_call:
    inputs:
      app-name:
        description: "Application name"
        required: true
        type: string
      ecr-repo:
        description: "Full ECR repository URI"
        required: true
        type: string
      java-version:
        description: "Java version (e.g. 17, 21)"
        required: false
        type: string
        default: "17"
      build-tool:
        description: "Build tool: maven or gradle"
        required: false
        type: string
        default: "maven"
      sonar-enabled:
        description: "Run SonarQube scan"
        required: false
        type: boolean
        default: false
    secrets:
      AWS_ROLE_ARN:
        required: true
      GITOPS_REPO_TOKEN:
        required: true
      SONAR_TOKEN:
        required: false

permissions:
  id-token: write
  contents: read

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  ci:
    name: Test & Build — Java ${{ inputs.java-version }} (${{ inputs.build-tool }})
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for SonarQube blame data

      - name: Setup Java ${{ inputs.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: temurin
          cache: ${{ inputs.build-tool }}

      # ─── Maven build path ────────────────────────────────────────────────────
      - name: Build and test with Maven
        if: inputs.build-tool == 'maven'
        run: mvn verify --no-transfer-progress -B
        env:
          MAVEN_OPTS: "-Xmx2g"

      - name: Upload Maven Surefire reports
        if: inputs.build-tool == 'maven' && always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-${{ inputs.app-name }}
          path: target/surefire-reports/
          retention-days: 14

      # ─── Gradle build path ───────────────────────────────────────────────────
      - name: Build and test with Gradle
        if: inputs.build-tool == 'gradle'
        run: ./gradlew test --no-daemon
        env:
          GRADLE_OPTS: "-Xmx2g"

      - name: Upload Gradle test reports
        if: inputs.build-tool == 'gradle' && always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-test-report-${{ inputs.app-name }}
          path: build/reports/tests/
          retention-days: 14

      # ─── SonarQube scan (optional) ───────────────────────────────────────────
      - name: SonarQube scan — Maven
        if: inputs.sonar-enabled == true && inputs.build-tool == 'maven'
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=${{ inputs.app-name }} \
            -Dsonar.host.url=${{ vars.SONAR_HOST_URL }} \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }} \
            --no-transfer-progress -B
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarQube scan — Gradle
        if: inputs.sonar-enabled == true && inputs.build-tool == 'gradle'
        run: |
          ./gradlew sonar \
            -Dsonar.projectKey=${{ inputs.app-name }} \
            -Dsonar.host.url=${{ vars.SONAR_HOST_URL }} \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }} \
            --no-daemon
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build-and-deploy:
    name: Build, Push & GitOps Update
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: build-${{ inputs.app-name }}-${{ github.run_id }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve target cluster, overlay and environment
        id: resolve-target
        run: |
          REF="${{ github.ref }}"
          BRANCH="${REF#refs/heads/}"

          if [[ "$BRANCH" == feature/* ]]; then
            CLUSTER="eks-test-1"
            OVERLAY="test-1"
            ENVIRONMENT="staging"
          elif [[ "$BRANCH" == incidente/* ]]; then
            CLUSTER="eks-test-1 eks-test-2"
            OVERLAY="test-1 test-2"
            ENVIRONMENT="incident"
          elif [[ "$BRANCH" == "main" ]]; then
            CLUSTER="eks-test-2"
            OVERLAY="test-2"
            ENVIRONMENT="production"
          else
            CLUSTER=""
            OVERLAY=""
            ENVIRONMENT="none"
          fi

          echo "cluster=$CLUSTER"         >> "$GITHUB_OUTPUT"
          echo "overlay=$OVERLAY"         >> "$GITHUB_OUTPUT"
          echo "environment=$ENVIRONMENT" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ inputs.ecr-repo }}:${{ env.IMAGE_TAG }}
            ${{ inputs.ecr-repo }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_NAME=${{ inputs.app-name }}
            GIT_SHA=${{ github.sha }}
            JAVA_VERSION=${{ inputs.java-version }}

      - name: Clone GitOps repository
        if: steps.resolve-target.outputs.environment != 'none'
        run: |
          git clone \
            "https://x-access-token:${{ secrets.GITOPS_REPO_TOKEN }}@github.com/${{ vars.GITOPS_REPO }}.git" \
            gitops-repo
          cd gitops-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update kustomization overlays
        if: steps.resolve-target.outputs.environment != 'none'
        run: |
          cd gitops-repo
          OVERLAYS="${{ steps.resolve-target.outputs.overlay }}"
          APP="${{ inputs.app-name }}"

          for OVERLAY in $OVERLAYS; do
            KUSTOMIZE_FILE="apps/${APP}/overlays/${OVERLAY}/kustomization.yaml"
            if [[ ! -f "$KUSTOMIZE_FILE" ]]; then
              echo "WARNING: $KUSTOMIZE_FILE not found, skipping overlay $OVERLAY"
              continue
            fi
            yq e -i \
              "(.images[] | select(.name == \"${{ inputs.ecr-repo }}\")).newTag = \"${{ env.IMAGE_TAG }}\"" \
              "$KUSTOMIZE_FILE"
            git add "$KUSTOMIZE_FILE"
          done

      - name: Commit and push GitOps changes
        if: steps.resolve-target.outputs.environment != 'none'
        run: |
          cd gitops-repo
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          BRANCH_NAME="app/${{ inputs.app-name }}/${{ github.sha }}"
          git checkout -b "$BRANCH_NAME"
          git commit -m "chore(${{ inputs.app-name }}): update image to ${{ env.IMAGE_TAG }}

          App:         ${{ inputs.app-name }}
          Image:       ${{ inputs.ecr-repo }}:${{ env.IMAGE_TAG }}
          Overlay(s):  ${{ steps.resolve-target.outputs.overlay }}
          Environment: ${{ steps.resolve-target.outputs.environment }}
          Source SHA:  ${{ github.sha }}"
          git push origin "$BRANCH_NAME"
