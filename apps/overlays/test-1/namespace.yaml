apiVersion: v1
kind: Namespace
metadata:
  name: study-platform
  labels:
    # Enable Istio sidecar injection for all pods in this namespace.
    # The Istio control plane on eks-test-1 watches this label.
    istio-injection: enabled

    # Network topology label for Istio multi-primary multi-network routing.
    # Istio uses this to know which network the pods in this namespace belong to,
    # enabling cross-cluster service discovery via the East-West Gateway.
    # Value MUST match the network name configured in the Istio IstioOperator for eks-test-1.
    topology.istio.io/network: eks-test-1

    # Standard Kubernetes labels
    kubernetes.io/metadata.name: study-platform
    app.kubernetes.io/part-of: study-platform
    environment: staging
    cluster: eks-test-1

  annotations:
    # ArgoCD sync wave: Namespace must exist before any other resource (wave -2)
    argocd.argoproj.io/sync-wave: "-2"

    # Provenance — this namespace was created by ArgoCD from the GitOps repo
    argocd.argoproj.io/managed-by: argocd

    # Istio topology context
    topology.istio.io/network: eks-test-1
