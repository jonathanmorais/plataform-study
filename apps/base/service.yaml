apiVersion: v1
kind: Service
metadata:
  name: study-platform
  namespace: study-platform
  labels:
    app: study-platform
    app.kubernetes.io/name: study-platform
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: study-platform
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    # Prometheus scrape via kube-state-metrics endpoint discovery
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    # Istio uses the port name prefix to detect the protocol.
    # "http-" prefix → Istio treats traffic as HTTP/1.1 for L7 routing rules.
    # Change to "grpc-" if the service speaks gRPC.
spec:
  type: ClusterIP
  # ClusterIP: traffic reaches pods via Istio VirtualService + DestinationRule.
  # No LoadBalancer or NodePort — all external ingress goes through the Istio Gateway.

  selector:
    # Must match the pod template labels in deployment.yaml
    app: study-platform

  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP

  # Session affinity off — let Istio handle load balancing via DestinationRule
  sessionAffinity: None
