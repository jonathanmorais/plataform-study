apiVersion: v1
kind: ConfigMap
metadata:
  name: study-platform-config
  namespace: study-platform
  labels:
    app: study-platform
    app.kubernetes.io/name: study-platform
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: study-platform
  annotations:
    # ConfigMap deploys in wave -1 so pods in wave 0 always find it
    argocd.argoproj.io/sync-wave: "-1"
data:
  # ── Logging ──────────────────────────────────────────────────────────────────
  # Overriding per-overlay is optional; overlays patch only APP_ENV by default.
  # Accepted values: debug | info | warn | error
  LOG_LEVEL: "info"

  # ── Application environment ───────────────────────────────────────────────────
  # IMPORTANT: This key is patched by each overlay:
  #   test-1 overlay → APP_ENV=staging
  #   test-2 overlay → APP_ENV=production
  # The base value acts as a safe default (never used in production).
  APP_ENV: "local"

  # ── HTTP server ───────────────────────────────────────────────────────────────
  PORT: "8080"

  # ── AWS region ────────────────────────────────────────────────────────────────
  AWS_REGION: "us-east-1"

  # ── Feature flags (non-sensitive) ────────────────────────────────────────────
  # Enable structured JSON logging for log aggregation in Loki
  LOG_FORMAT: "json"

  # Tracing — Jaeger collector endpoint injected via Istio, but the app
  # can also configure its own exporter. Overlays can patch this.
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger-collector.istio-system.svc.cluster.local:4317"
  OTEL_SERVICE_NAME: "study-platform"
  OTEL_TRACES_SAMPLER: "parentbased_traceidratio"
  OTEL_TRACES_SAMPLER_ARG: "0.1"

  # ── Health check ─────────────────────────────────────────────────────────────
  HEALTH_PATH: "/health"

  # ── Graceful shutdown ────────────────────────────────────────────────────────
  # Seconds to wait for in-flight requests before exiting.
  # Must be <= terminationGracePeriodSeconds in the Deployment.
  SHUTDOWN_TIMEOUT: "30"

  # ── Database pool ────────────────────────────────────────────────────────────
  # DATABASE_URL comes from the Secret, but pool sizing is non-sensitive
  DB_POOL_MIN: "2"
  DB_POOL_MAX: "10"
  DB_POOL_IDLE_TIMEOUT: "30000"
