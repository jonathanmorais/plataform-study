---
# =============================================================================
# playbooks/04-remote-secrets.yaml
#
# Day-0: Exchange remote kubeconfig secrets between eks-test-1 and eks-test-2
# so each cluster's istiod can discover endpoints on the other cluster.
#
# Flow:
#   a) istioctl create-remote-secret on eks-test-2  → apply to eks-test-1
#   b) istioctl create-remote-secret on eks-test-1  → apply to eks-test-2
#
# After this playbook, istiod on each cluster will watch the other cluster's
# API server for ServiceEntry / Endpoint updates.
#
# Usage:
#   ansible-playbook playbooks/04-remote-secrets.yaml
#
# Prerequisites:
#   - 03-east-west-gateway.yaml must have succeeded
# =============================================================================

- name: "04-remote-secrets | Exchange cross-cluster remote secrets"
  hosts: localhost
  gather_facts: false

  tasks:
    # -------------------------------------------------------------------------
    # 1. Create remote secret from eks-test-2 → apply to eks-test-1
    # -------------------------------------------------------------------------
    - name: "eks-test-2 → eks-test-1 | Create remote secret for eks-test-2"
      ansible.builtin.command:
        cmd: >-
          {{ istioctl_path }}
          create-remote-secret
          --context=eks-test-2
          --name=eks-test-2
          --server=https://{{ _api_t2 }}
      vars:
        # Retrieve the API server endpoint for eks-test-2 from AWS
        _api_t2: >-
          {{ lookup('pipe',
             'aws eks describe-cluster --region ' + aws_region +
             ' --name eks-test-2 --query cluster.endpoint --output text') |
             regex_replace('^https://', '') }}
      register: _remote_secret_t2
      changed_when: true

    - name: "eks-test-2 → eks-test-1 | Save eks-test-2 remote secret to file"
      ansible.builtin.copy:
        dest: /tmp/remote-secret-eks-test-2.yaml
        content: "{{ _remote_secret_t2.stdout }}"
        mode: "0600"

    - name: "eks-test-2 → eks-test-1 | Apply eks-test-2 secret to eks-test-1"
      kubernetes.core.k8s:
        context: eks-test-1
        state: present
        src: /tmp/remote-secret-eks-test-2.yaml

    - name: "eks-test-2 → eks-test-1 | Verify secret was created on eks-test-1"
      kubernetes.core.k8s_info:
        context: eks-test-1
        api_version: v1
        kind: Secret
        namespace: istio-system
        label_selectors:
          - "istio/multiCluster=true"
      register: _t1_remote_secrets
      failed_when: _t1_remote_secrets.resources | length == 0

    # -------------------------------------------------------------------------
    # 2. Create remote secret from eks-test-1 → apply to eks-test-2
    # -------------------------------------------------------------------------
    - name: "eks-test-1 → eks-test-2 | Create remote secret for eks-test-1"
      ansible.builtin.command:
        cmd: >-
          {{ istioctl_path }}
          create-remote-secret
          --context=eks-test-1
          --name=eks-test-1
          --server=https://{{ _api_t1 }}
      vars:
        _api_t1: >-
          {{ lookup('pipe',
             'aws eks describe-cluster --region ' + aws_region +
             ' --name eks-test-1 --query cluster.endpoint --output text') |
             regex_replace('^https://', '') }}
      register: _remote_secret_t1
      changed_when: true

    - name: "eks-test-1 → eks-test-2 | Save eks-test-1 remote secret to file"
      ansible.builtin.copy:
        dest: /tmp/remote-secret-eks-test-1.yaml
        content: "{{ _remote_secret_t1.stdout }}"
        mode: "0600"

    - name: "eks-test-1 → eks-test-2 | Apply eks-test-1 secret to eks-test-2"
      kubernetes.core.k8s:
        context: eks-test-2
        state: present
        src: /tmp/remote-secret-eks-test-1.yaml

    - name: "eks-test-1 → eks-test-2 | Verify secret was created on eks-test-2"
      kubernetes.core.k8s_info:
        context: eks-test-2
        api_version: v1
        kind: Secret
        namespace: istio-system
        label_selectors:
          - "istio/multiCluster=true"
      register: _t2_remote_secrets
      failed_when: _t2_remote_secrets.resources | length == 0

    # -------------------------------------------------------------------------
    # 3. Wait for istiod to pick up remote secrets and populate endpoint slices
    # -------------------------------------------------------------------------
    - name: "verify | Wait for istiod on eks-test-1 to restart after secret creation"
      ansible.builtin.pause:
        seconds: 30
        prompt: >-
          Waiting 30s for istiod on eks-test-1 to process the remote secret
          and begin watching eks-test-2 API server...

    - name: "verify | Wait for istiod on eks-test-2 to restart after secret creation"
      ansible.builtin.pause:
        seconds: 15
        prompt: >-
          Waiting 15s for istiod on eks-test-2 to process the remote secret...

    - name: "verify | Check istiod pods are running on eks-test-1"
      kubernetes.core.k8s_info:
        context: eks-test-1
        api_version: v1
        kind: Pod
        namespace: istio-system
        label_selectors:
          - "app=istiod"
      register: _t1_istiod_pods
      until: >-
        _t1_istiod_pods.resources | length > 0 and
        _t1_istiod_pods.resources |
          selectattr('status.phase', 'equalto', 'Running') | list | length > 0
      retries: 15
      delay: 10

    - name: "verify | Check istiod pods are running on eks-test-2"
      kubernetes.core.k8s_info:
        context: eks-test-2
        api_version: v1
        kind: Pod
        namespace: istio-system
        label_selectors:
          - "app=istiod"
      register: _t2_istiod_pods
      until: >-
        _t2_istiod_pods.resources | length > 0 and
        _t2_istiod_pods.resources |
          selectattr('status.phase', 'equalto', 'Running') | list | length > 0
      retries: 15
      delay: 10

    # -------------------------------------------------------------------------
    # 4. Verify cross-cluster endpoint discovery
    #    We deploy a canary curl pod in istio-system, then probe proxy-config
    # -------------------------------------------------------------------------
    - name: "verify | Deploy verification pod on eks-test-1"
      kubernetes.core.k8s:
        context: eks-test-1
        state: present
        definition:
          apiVersion: v1
          kind: Pod
          metadata:
            name: istio-verify-cross-cluster
            namespace: istio-system
            labels:
              app: istio-verify-cross-cluster
              sidecar.istio.io/inject: "true"
          spec:
            containers:
              - name: curl
                image: curlimages/curl:8.5.0
                command: ["sleep", "3600"]
                resources:
                  requests:
                    cpu: 10m
                    memory: 32Mi
            restartPolicy: Always

    - name: "verify | Wait for verification pod to be ready on eks-test-1"
      kubernetes.core.k8s_info:
        context: eks-test-1
        api_version: v1
        kind: Pod
        name: istio-verify-cross-cluster
        namespace: istio-system
      register: _verify_pod
      until: >-
        _verify_pod.resources | length > 0 and
        (_verify_pod.resources[0].status.phase | default('')) == 'Running'
      retries: 20
      delay: 10

    - name: "verify | Run istioctl proxy-config endpoints on eks-test-1"
      ansible.builtin.command:
        cmd: >-
          {{ istioctl_path }}
          --context=eks-test-1
          proxy-config endpoints
          istio-verify-cross-cluster.istio-system
          --cluster "outbound|443||kubernetes.default.svc.cluster.local"
      register: _proxy_config_result
      changed_when: false
      failed_when: false

    - name: "verify | Display proxy-config endpoints output"
      ansible.builtin.debug:
        var: _proxy_config_result.stdout_lines

    - name: "verify | Clean up verification pod on eks-test-1"
      kubernetes.core.k8s:
        context: eks-test-1
        state: absent
        definition:
          apiVersion: v1
          kind: Pod
          metadata:
            name: istio-verify-cross-cluster
            namespace: istio-system

    # -------------------------------------------------------------------------
    # 5. Summary
    # -------------------------------------------------------------------------
    - name: "Summary | Remote secrets exchange complete"
      ansible.builtin.debug:
        msg:
          - "Remote secrets exchanged successfully."
          - "eks-test-1 multiCluster secrets: {{ _t1_remote_secrets.resources | map(attribute='metadata.name') | list | join(', ') }}"
          - "eks-test-2 multiCluster secrets: {{ _t2_remote_secrets.resources | map(attribute='metadata.name') | list | join(', ') }}"
          - "istiod on eks-test-1 running pods: {{ _t1_istiod_pods.resources | selectattr('status.phase', 'equalto', 'Running') | list | length }}"
          - "istiod on eks-test-2 running pods: {{ _t2_istiod_pods.resources | selectattr('status.phase', 'equalto', 'Running') | list | length }}"
          - "Next: run 05-register-argocd.yaml"
