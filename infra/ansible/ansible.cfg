[defaults]
inventory             = inventory/hosts.yaml
remote_user           = ec2-user
private_key_file      = ~/.ssh/eks-study-platform.pem
host_key_checking     = False
stdout_callback       = yaml
collections_paths     = ~/.ansible/collections
roles_path            = roles
retry_files_enabled   = False
gathering             = smart
fact_caching          = jsonfile
fact_caching_connection = /tmp/ansible-facts
fact_caching_timeout  = 3600
forks                 = 10
timeout               = 30
# Increase verbosity for idempotency checks during AMI builds
any_errors_fatal      = False

[inventory]
enable_plugins = aws_ec2, host_list, yaml, ini, auto

[privilege_escalation]
become        = True
become_method = sudo
become_user   = root
become_ask_pass = False

[ssh_connection]
ssh_args            = -o ControlMaster=auto -o ControlPersist=300s -o StrictHostKeyChecking=no
pipelining          = True
control_path_dir    = /tmp/ansible-cp

[persistent_connection]
connect_timeout = 30
command_timeout = 60
