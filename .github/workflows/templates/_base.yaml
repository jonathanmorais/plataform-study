name: Base — Build, Push & GitOps Update (Reusable)

on:
  workflow_call:
    inputs:
      app-name:
        description: "Application name (used for image tagging and GitOps paths)"
        required: true
        type: string
      ecr-repo:
        description: "Full ECR repository URI (e.g. 123456789.dkr.ecr.us-east-1.amazonaws.com/my-app)"
        required: true
        type: string
    secrets:
      AWS_ROLE_ARN:
        required: true
      GITOPS_REPO_TOKEN:
        required: true

permissions:
  id-token: write
  contents: read

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-deploy:
    name: Build, Push & Update GitOps
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.push.outputs.image }}
      target_cluster: ${{ steps.resolve-target.outputs.cluster }}
      overlay: ${{ steps.resolve-target.outputs.overlay }}
      environment: ${{ steps.resolve-target.outputs.environment }}

    steps:
      - name: Checkout application repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: build-${{ inputs.app-name }}-${{ github.run_id }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # ─── Determine deployment target based on branch ─────────────────────────
      - name: Resolve target cluster, overlay and environment
        id: resolve-target
        run: |
          REF="${{ github.ref }}"
          BRANCH="${REF#refs/heads/}"

          if [[ "$BRANCH" == feature/* ]]; then
            CLUSTER="eks-test-1"
            OVERLAY="test-1"
            ENVIRONMENT="staging"

          elif [[ "$BRANCH" == incidente/* ]]; then
            # Incident branches deploy to both test-1 and test-2 simultaneously
            CLUSTER="eks-test-1 eks-test-2"
            OVERLAY="test-1 test-2"
            ENVIRONMENT="incident"

          elif [[ "$BRANCH" == "main" ]]; then
            CLUSTER="eks-test-2"
            OVERLAY="test-2"
            ENVIRONMENT="production"

          else
            echo "Branch '$BRANCH' does not match any deploy target. Skipping deploy."
            CLUSTER=""
            OVERLAY=""
            ENVIRONMENT="none"
          fi

          echo "cluster=$CLUSTER"   >> "$GITHUB_OUTPUT"
          echo "overlay=$OVERLAY"   >> "$GITHUB_OUTPUT"
          echo "environment=$ENVIRONMENT" >> "$GITHUB_OUTPUT"

          echo "### Deploy target resolved" >> "$GITHUB_STEP_SUMMARY"
          echo "| Key | Value |"            >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------|"            >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch      | $BRANCH      |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Cluster(s)  | $CLUSTER     |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Overlay(s)  | $OVERLAY     |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Environment | $ENVIRONMENT |" >> "$GITHUB_STEP_SUMMARY"

      # ─── Docker Build & Push ─────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ inputs.ecr-repo }}:${{ env.IMAGE_TAG }}
            ${{ inputs.ecr-repo }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
          build-args: |
            APP_NAME=${{ inputs.app-name }}
            GIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}

      - name: Export full image URI
        run: |
          FULL_IMAGE="${{ inputs.ecr-repo }}:${{ env.IMAGE_TAG }}"
          echo "image=$FULL_IMAGE" >> "$GITHUB_OUTPUT"
          echo "Built and pushed: $FULL_IMAGE"
        id: image-uri

      # ─── GitOps Repository Update ────────────────────────────────────────────
      - name: Clone GitOps repository
        if: steps.resolve-target.outputs.environment != 'none'
        run: |
          git clone \
            "https://x-access-token:${{ secrets.GITOPS_REPO_TOKEN }}@github.com/${{ vars.GITOPS_REPO }}.git" \
            gitops-repo
          cd gitops-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update kustomization overlays with new image tag
        if: steps.resolve-target.outputs.environment != 'none'
        run: |
          cd gitops-repo

          OVERLAYS="${{ steps.resolve-target.outputs.overlay }}"
          APP="${{ inputs.app-name }}"
          NEW_IMAGE="${{ inputs.ecr-repo }}:${{ env.IMAGE_TAG }}"

          for OVERLAY in $OVERLAYS; do
            KUSTOMIZE_FILE="apps/${APP}/overlays/${OVERLAY}/kustomization.yaml"

            if [[ ! -f "$KUSTOMIZE_FILE" ]]; then
              echo "WARNING: $KUSTOMIZE_FILE not found, skipping overlay $OVERLAY"
              continue
            fi

            echo "Updating $KUSTOMIZE_FILE → $NEW_IMAGE"

            # Use yq to safely update the newTag field for the correct image entry
            yq e -i \
              "(.images[] | select(.name == \"${{ inputs.ecr-repo }}\")).newTag = \"${{ env.IMAGE_TAG }}\"" \
              "$KUSTOMIZE_FILE"

            git add "$KUSTOMIZE_FILE"
          done

      - name: Commit and push GitOps changes
        if: steps.resolve-target.outputs.environment != 'none'
        run: |
          cd gitops-repo

          if git diff --cached --quiet; then
            echo "No changes to commit in GitOps repo."
            exit 0
          fi

          BRANCH_NAME="app/${{ inputs.app-name }}/${{ github.sha }}"

          git checkout -b "$BRANCH_NAME"
          git commit -m "chore(${{ inputs.app-name }}): update image to ${{ env.IMAGE_TAG }}

          App:         ${{ inputs.app-name }}
          Image:       ${{ inputs.ecr-repo }}:${{ env.IMAGE_TAG }}
          Overlay(s):  ${{ steps.resolve-target.outputs.overlay }}
          Environment: ${{ steps.resolve-target.outputs.environment }}
          Source SHA:  ${{ github.sha }}
          Source ref:  ${{ github.ref }}"

          git push origin "$BRANCH_NAME"

          echo "GitOps branch pushed: $BRANCH_NAME"
          echo "ArgoCD will sync automatically via branch tracking."
